volumes:
  postgres_data: {}

services:
  # ============ Approach 1: Pure Facade ============

  his:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ENTRY_POINT: src/facade/his-server.ts
    profiles: [facade]
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:4000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    profiles: [facade]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  facade:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ENTRY_POINT: src/facade/index.ts
    profiles: [facade]
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - CACHE_TTL_SECONDS=60
      - REDIS_URL=redis://redis:6379
      - HIS_BASE_URL=http://his:4000
      - HIS_CLIENT_ID=his-client
      - HIS_CLIENT_SECRET=his-secret
      - HIS_ENVIRONMENT=TEST
      - REQUESTING_PRODUCT=FHIR-Facade/1.0.0
    depends_on:
      redis:
        condition: service_healthy
      his:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============ Approach 2: Event-Driven ============

  rabbitmq:
    image: rabbitmq:4-management
    profiles: [event-driven]
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: docker.io/library/postgres:18
    profiles: [event-driven]
    volumes:
      - postgres_data:/var/lib/postgresql/18/docker:delegated
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
    environment:
      POSTGRES_USER: aidbox
      POSTGRES_PORT: "5432"
      POSTGRES_DB: aidbox
      POSTGRES_PASSWORD: aKzqYZGsjV
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aidbox"]
      interval: 5s
      timeout: 3s
      retries: 5

  aidbox:
    image: docker.io/healthsamurai/aidboxone:edge
    profiles: [event-driven]
    pull_policy: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - 8080:8080
    environment:
      BOX_ADMIN_PASSWORD: O1yLBrsy84
      BOX_BOOTSTRAP_FHIR_PACKAGES: hl7.fhir.r4.core#4.0.1
      BOX_COMPATIBILITY_VALIDATION_JSON__SCHEMA_REGEX: "#{:fhir-datetime}"
      BOX_DB_DATABASE: aidbox
      BOX_DB_HOST: postgres
      BOX_DB_PASSWORD: aKzqYZGsjV
      BOX_DB_PORT: "5432"
      BOX_DB_USER: aidbox
      BOX_FHIR_BUNDLE_EXECUTION_VALIDATION_MODE: limited
      BOX_FHIR_COMPLIANT_MODE: "true"
      BOX_FHIR_CORRECT_AIDBOX_FORMAT: "true"
      BOX_FHIR_CREATEDAT_URL: https://aidbox.app/ex/createdAt
      BOX_FHIR_SCHEMA_VALIDATION: "true"
      BOX_FHIR_SEARCH_AUTHORIZE_INLINE_REQUESTS: "true"
      BOX_FHIR_SEARCH_CHAIN_SUBSELECT: "true"
      BOX_FHIR_SEARCH_COMPARISONS: "true"
      BOX_FHIR_TERMINOLOGY_ENGINE: hybrid
      BOX_FHIR_TERMINOLOGY_ENGINE_HYBRID_EXTERNAL_TX_SERVER: https://tx.health-samurai.io/fhir
      BOX_FHIR_TERMINOLOGY_SERVICE_BASE_URL: https://tx.health-samurai.io/fhir
      BOX_MODULE_SDC_STRICT_ACCESS_CONTROL: "true"
      BOX_ROOT_CLIENT_SECRET: WdodyB65ij
      BOX_SEARCH_INCLUDE_CONFORMANT: "true"
      BOX_SECURITY_AUDIT_LOG_ENABLED: "true"
      BOX_SECURITY_DEV_MODE: "true"
      BOX_SETTINGS_MODE: read-write
      BOX_WEB_BASE_URL: http://localhost:8080
      BOX_WEB_PORT: 8080
    healthcheck:
      test: curl -f http://localhost:8080/health || exit 1
      interval: 5s
      timeout: 5s
      retries: 90
      start_period: 30s

  consumer:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ENTRY_POINT: src/event-driven/consumer.ts
    profiles: [event-driven]
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - FHIR_SERVER_URL=http://aidbox:8080
      - AIDBOX_CLIENT_ID=root
      - AIDBOX_CLIENT_SECRET=WdodyB65ij
      - PREFETCH=10
    depends_on:
      rabbitmq:
        condition: service_healthy
      aidbox:
        condition: service_healthy
    restart: unless-stopped
