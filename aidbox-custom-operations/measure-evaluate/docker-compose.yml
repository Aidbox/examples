volumes:
  pg_data: {}
services:
  db:
    image: postgres:17
    command: ["postgres", "-c", "shared_preload_libraries=pg_stat_statements"]
    volumes:
      - pg_data:/var/lib/postgresql/data:delegated
    environment:
      POSTGRES_USER: aidbox
      POSTGRES_PORT: "5432"
      POSTGRES_DB: aidbox
      POSTGRES_PASSWORD: M3ya7uZxdJ
  aidbox:
    image: healthsamurai/aidboxone:2606.2
    depends_on:
      - db
    ports:
      - 8888:8888
    volumes:
      - ./init.json:/tmp/init.json
    environment:
      # ── Terminology ──
      BOX_FHIR_TERMINOLOGY_ENGINE: hybrid
      BOX_FHIR_TERMINOLOGY_SERVICE_BASE_URL: https://tx.health-samurai.io/fhir
      BOX_FHIR_TERMINOLOGY_ENGINE_HYBRID_EXTERNAL_TX_SERVER: https://tx.health-samurai.io/fhir
      # ── FHIR packages + validation ──
      BOX_BOOTSTRAP_FHIR_PACKAGES: hl7.fhir.r4.core#4.0.1
      BOX_FHIR_SCHEMA_VALIDATION: true
      BOX_FHIR_BUNDLE_EXECUTION_VALIDATION_MODE: limited
      BOX_FHIR_COMPLIANT_MODE: true
      BOX_FHIR_CORRECT_AIDBOX_FORMAT: true
      BOX_FHIR_CREATEDAT_URL: https://aidbox.app/ex/createdAt
      # ── Search ──
      BOX_FHIR_SEARCH_COMPARISONS: true
      BOX_FHIR_SEARCH_AUTHORIZE_INLINE_REQUESTS: true
      BOX_FHIR_SEARCH_CHAIN_SUBSELECT: true
      BOX_SEARCH_INCLUDE_CONFORMANT: true
      # ── Security ──
      BOX_ADMIN_PASSWORD: cwSgexVsRb
      BOX_ROOT_CLIENT_SECRET: secret
      BOX_SECURITY_AUDIT_LOG_ENABLED: true
      BOX_SECURITY_DEV_MODE: true
      BOX_MODULE_SDC_STRICT_ACCESS_CONTROL: true
      # ── Web / init ──
      BOX_WEB_PORT: 8888
      BOX_WEB_BASE_URL: http://localhost:8888
      BOX_SETTINGS_MODE: read-write
      BOX_INIT_BUNDLE: file:///tmp/init.json
      BOX_COMPATIBILITY_VALIDATION_JSON__SCHEMA_REGEX: "#{:fhir-datetime}"
      # Raise worker pool above default 8 to mitigate the known
      # `server/with-channel` race condition in Aidbox HTTP-RPC dispatch
      # (Sansara box/src/box/app/operations.clj:293-295 — FIXME). Manifests
      # as 30s idle-timeout 500s on slow custom-operation paths.
      BOX_WEB_THREAD: "32"
      # ── Postgres ──
      PGHOST: db
      PGUSER: aidbox
      PGDATABASE: aidbox
      PGPASSWORD: M3ya7uZxdJ
      PGPORT: "5432"
  sql-evaluate-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    environment:
      AIDBOX_URL: http://aidbox:8888
      AIDBOX_USER: root
      AIDBOX_PASS: secret
      REPO_ROOT: /app
    depends_on:
      - aidbox
